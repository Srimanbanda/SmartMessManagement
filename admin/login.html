<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Mess | Admin Portal</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 10px; margin-top: 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Portal</h2>
        <form id="adminLoginForm">
            
            <select id="roleSelect" required>
                <option value="" disabled selected>-- Select Your Role --</option>
                <option value="College_Admin">College Admin (Registrations & Finance)</option>
                <option value="Mess_Admin">Mess Admin (Menus & Bookings)</option>
            </select>

            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Secure Login</button>
            
            <div id="errorMsg" style="color: red; margin-top: 15px; display: none; font-size: 14px; line-height: 1.4;"></div>
        </form>
    </div>
    
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const r = document.getElementById('roleSelect').value;
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerText = "Authenticating...";
            errorMsg.style.display = 'none';
            
            try {
                const res = await fetch('http://localhost:3000/api/admin/login', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, role: r }) // Sending role to backend
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('admin_id', data.admin.id);
                    localStorage.setItem('admin_role', data.admin.role);
                    
                    if (data.admin.role === 'College_Admin') {
                        window.location.href = 'college-admin.html';
                    } else {
                        window.location.href = 'index.html'; 
                    }
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.style.display = 'block';
                    btn.innerText = "Secure Login";
                }
            } catch (err) {
                errorMsg.innerText = "Server connection failed.";
                errorMsg.style.display = 'block';
                btn.innerText = "Secure Login";
            }
        });
    </script>
</body>
</html>
