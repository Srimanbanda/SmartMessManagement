<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Mess | Admin Portal</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background: var(--bg-dark); 
        }
        .login-wrapper {
            width: 100%; padding: 20px; display: flex; justify-content: center; perspective: 1000px;
        }
        .login-box { 
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 45px 35px; border-radius: 20px; width: 100%; max-width: 420px; text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid var(--card-border);
            animation: fadeIn 0.6s ease-out;
        }
        .login-box h2 { 
            font-size: 28px; font-weight: 700; margin-bottom: 25px; 
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        select, input {
            width: 100%; padding: 14px 16px; margin: 10px 0; border: 1px solid var(--border);
            border-radius: 12px; font-size: 15px; outline: none; background: rgba(15, 23, 42, 0.6);
            color: var(--text-main); transition: all 0.3s ease;
        }
        select:focus, input:focus {
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h2>Admin Portal</h2>
            <form id="adminLoginForm">
                
                <select id="roleSelect" required>
                    <option value="" disabled selected>-- Select Your Role --</option>
                    <option value="College_Admin">College Admin</option>
                    <option value="Mess_Admin">Mess Admin</option>
                </select>

                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Secure Login</button>
                
                <div id="errorMsg" class="message error" style="display: none;"></div>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const r = document.getElementById('roleSelect').value;
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerText = "Authenticating...";
            errorMsg.style.display = 'none';
            
            try {
                const res = await fetch('http://localhost:3000/api/admin/login', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, role: r }) // Sending role to backend
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('admin_id', data.admin.id);
                    localStorage.setItem('admin_role', data.admin.role);
                    
                    if (data.admin.role === 'College_Admin') {
                        window.location.href = 'college-admin.html';
                    } else {
                        window.location.href = 'index.html'; 
                    }
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.style.display = 'block';
                    btn.innerText = "Secure Login";
                }
            } catch (err) {
                errorMsg.innerText = "Server connection failed.";
                errorMsg.style.display = 'block';
                btn.innerText = "Secure Login";
            }
        });
    </script>
</body>
</html>
